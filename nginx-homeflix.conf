# /etc/nginx/sites-available/homeflix
# HomeFlix served over HTTPS on port 8443, proxying to the app on 127.0.0.1:8002.
# Reuses your existing self-signed local cert. Open-WebUI keeps 443 as default.
#
# Enable with:
#   sudo ln -s /etc/nginx/sites-available/homeflix /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then browse to:  https://<server-ip>:8443/

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/local.crt;
    ssl_certificate_key /etc/nginx/ssl/local.key;

    # Allow large video responses to stream without limits.
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # lets Django trust HTTPS for CSRF

        # Critical for video: stream bytes straight through, don't buffer to disk,
        # and keep Range/seek working.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
