{% extends base_template %}
{% load library_extras %}
{% block content %}
<h1>History</h1>
{% if events %}
  <div class="grid" style="margin-top:18px">
    {% for e in events %}
      {% with video=e.video card_qs="ctx=history" %}{% include "library/_card.html" %}{% endwith %}
    {% endfor %}
  </div>
{% else %}
  <div class="empty"><p>Nothing watched yet.</p></div>
{% endif %}
{% endblock %}
